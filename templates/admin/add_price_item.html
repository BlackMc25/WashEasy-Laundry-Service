{% extends 'admin/base_admin.html' %}

{% block content %}
<div class="mb-3">

    <a
        href="{% url 'admin_price_management' %}"
        class="btn btn-secondary">

        <i class="bi bi-arrow-left"></i>

        Back

    </a>

</div>

<div class="card shadow-sm">

    <div class="card-body">

        <h3 class="mb-4">

            Add Price Item

        </h3>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label>

                    Item Name

                </label>

                <input
                    type="text"
                    name="item_name"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label>

                    Category

                </label>

                <select
                    name="category"
                    class="form-select"
                    required>

                    {% for value,label in categories %}

                    <option value="{{ value }}">

                        {{ label }}

                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="mb-3">

                <label>

                    Service Type

                </label>

                <select
                    name="service_type"
                    class="form-select"
                    required>

                    {% for value,label in services %}

                    <option value="{{ value }}">

                        {{ label }}

                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="mb-3">

                <label>

                    Price

                </label>

                <input
                    type="number"
                    step="0.01"
                    name="price"
                    class="form-control"
                    required>

            </div>

            <button
                type="submit"
                class="btn btn-success">

                Save Item

            </button>

        </form>

    </div>

</div>

{% endblock %}

{% extends 'admin/base_admin.html' %}

{% block content %}

<div class="card shadow-sm">

    <div class="card-body">

        <h3>

            Settings

        </h3>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label>

                    Business Name

                </label>

                <input
                    type="text"
                    name="business_name"
                    value="{{ site_settings.business_name }}"
                    class="form-control">

            </div>

            <div class="mb-3">

                <label>

                    Business Email

                </label>

                <input
                    type="email"
                    name="business_email"
                    value="{{ site_settings.business_email }}"
                    class="form-control">

            </div>

            <div class="mb-3">

                <label>

                    Business Phone

                </label>

                <input
                    type="text"
                    name="business_phone"
                    value="{{ site_settings.business_phone }}"
                    class="form-control">

            </div>

            <div class="mb-3">

                <label>

                    Business Address

                </label>

                <input
                    type="text"
                    name="business_address"
                    value="{{ site_settings.business_address }}"
                    class="form-control">

            </div>

            <div class="row">

                <div class="col-md-6">

                    <div class="mb-3">

                        <label>

                            Business Latitude

                        </label>

                        <input
                            type="number"
                            step="any"
                            name="business_latitude"
                            value="{{ site_settings.business_latitude }}"
                            class="form-control">

                    </div>

                </div>

                <div class="col-md-6">

                    <div class="mb-3">

                        <label>

                            Business Longitude

                        </label>

                        <input
                            type="number"
                            step="any"
                            name="business_longitude"
                            value="{{ site_settings.business_longitude }}"
                            class="form-control">

                    </div>

                </div>

            </div>

            <div class="mb-3">

                <label>

                    Transport Fee Per KM

                </label>

                <input
                    type="number"
                    step="0.01"
                    name="transport_price_per_km"
                    value="{{ site_settings.transport_price_per_km }}"
                    class="form-control">

            </div>

            <button
                type="submit"
                class="btn btn-success">

                Save Settings

            </button>

        </form>

    </div>
    
    <hr>
    
    <div class="form-check form-switch mb-3">

    <input
        class="form-check-input"
        type="checkbox"
        name="notification_sound"
        id="notification_sound"

        {% if site_settings.notification_sound %}
            checked
        {% endif %}>

    <label
        class="form-check-label"
        for="notification_sound">

        Enable Notification Sounds

    </label>

</div>
</div>

{% endblock %}

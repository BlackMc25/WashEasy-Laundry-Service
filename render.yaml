services:
  - type: web
    name: washeasy
    runtime: python
    plan: free

    buildCommand: "./build.sh"

    startCommand: "gunicorn washeasy.wsgi:application"

    autoDeploy: true

    healthCheckPath: /

    envVars:
      - key: PYTHON_VERSION
        value: "3.13.5"

      - key: DEBUG
        value: "False"

      - key: DATABASE_URL
        fromDatabase:
          name: washeasy-db
          property: connectionString
<!DOCTYPE html>

<html lang="en">

<head>

```
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>

    WashEasy Delivery Verification

</title>

<link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

<style>

    body {

        background: #f5f7fb;

        min-height: 100vh;

        display: flex;

        justify-content: center;

        align-items: center;

    }

    .verification-card {

        width: 100%;

        max-width: 500px;

        background: white;

        padding: 40px;

        border-radius: 20px;

        box-shadow: 0 10px 30px rgba(0,0,0,0.1);

    }

    .logo {

        text-align: center;

        margin-bottom: 20px;

    }

    .logo h2 {

        color: #0d6efd;

        font-weight: bold;

    }

    .verify-btn {

        width: 100%;

        padding: 12px;

        font-size: 18px;

    }

</style>
```

</head>

<body>

```
<div class="verification-card">

    <div class="logo">

        <h2>

            WashEasy

        </h2>

        <p>

            Delivery Verification Portal

        </p>

    </div>

    {% if messages %}

        {% for message in messages %}

            <div class="alert alert-info">

                {{ message }}

            </div>

        {% endfor %}

    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

           <label class="form-label">
                Username
            </label>

            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Enter your username"
                required>

                    <div class="mb-4">

            <label class="form-label">

                4-Digit Verification Code

            </label>

            <input
                type="text"
                name="delivery_code"
                maxlength="4"
                class="form-control"
                placeholder="Enter Code"
                required>

        </div>

        <button
            type="submit"
            class="btn btn-success verify-btn">

            Verify Delivery

        </button>

    </form>

</div>
```

</body>

</html>

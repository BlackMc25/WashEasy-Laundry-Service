{% extends "base_dashboard.html" %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow border-0 rounded-4">

                <div class="card-body p-5">

                    <div class="text-center mb-4">

                        <h2 class="text-primary">

                            Create New Password

                        </h2>

                    </div>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label>

                                New Password

                            </label>

                            {{ form.new_password1 }}

                        </div>

                        <div class="mb-3">

                            <label>

                                Confirm Password

                            </label>

                            {{ form.new_password2 }}

                        </div>

                        <button
                            type="submit"
                            class="btn btn-success w-100">

                            Change Password

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}

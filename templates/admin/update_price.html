{% extends 'admin/base_admin.html' %}

{% block content %}

<div class="mb-3">

    <a
        href="{% url 'admin_price_management' %}"
        class="btn btn-secondary">

        <i class="bi bi-arrow-left"></i>

        Back

    </a>

</div>

<div class="admin-card">

    <h2>

        Update Price

    </h2>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label>

                Item

            </label>

            <input
                type="text"
                class="form-control"
                value="{{ item.item_name }}"
                readonly>

        </div>

        <div class="mb-3">

            <label>

                New Price

            </label>

            <input
                type="number"
                step="0.01"
                name="price"
                value="{{ item.price }}"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label>

                Express Service Price

            </label>

            <input
                type="number"
                step="0.01"
                name="express_price"
                value="{{ item.express_price }}"
                class="form-control">

        </div>

        <div class="form-check mb-4">

            <input
                type="checkbox"
                class="form-check-input"
                name="express_available"

                {% if item.express_available %}

                    checked

                {% endif %}

            >

            <label class="form-check-label">

                Enable Express Service

            </label>

        </div>

        <button
            type="submit"
            class="btn btn-success">

            Update Price

        </button>

    </form>

</div>

{% endblock %}

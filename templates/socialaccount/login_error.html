{% extends 'base_dashboard.html' %}

{% block content %}

<div class="container py-5">

    <div class="login-error-card">

        <div class="error-icon">

            <i class="fas fa-exclamation-triangle"></i>

        </div>

        <h1>

            Login Failed

        </h1>

        <p>

            We couldn't sign you in with Google.

        </p>

        <p class="text-muted">

            This may happen if your account information is incomplete
            or there was an authentication issue.

        </p>

        <div class="mt-4">

            <a href="{% url 'home' %}"
               class="btn btn-primary">

                Back to Home

            </a>

            <button
                data-bs-toggle="modal"
                data-bs-target="#loginModal"
                class="btn btn-outline-light ms-2">

                Try Again

            </button>

        </div>

    </div>

</div>

{% endblock %}

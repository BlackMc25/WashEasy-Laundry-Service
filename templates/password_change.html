{% extends 'base_dashboard.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card p-4 password-card">

        <h3>Change Password</h3>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="btn btn-primary">

                Update Password

            </button>

        </form>

    </div>

</div>

{% endblock %}

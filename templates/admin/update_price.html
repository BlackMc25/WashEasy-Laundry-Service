{% extends 'admin/base_admin.html' %}

{% block content %}

<div class="mb-3">

    <a
        href="{% url 'admin_price_management' %}"
        class="btn btn-secondary">

        <i class="bi bi-arrow-left"></i>

        Back

    </a>

</div>

<div class="admin-card">

    <h2>

        Update Price

    </h2>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label>

                Item

            </label>

            <input
                type="text"
                class="form-control"
                value="{{ item.item_name }}"
                readonly>

        </div>

        <div class="mb-3">

            <label>

                New Price

            </label>

            <input
                type="number"
                name="price"
                value="{{ item.price }}"
                class="form-control"
                required>

        </div>

        <button
            type="submit"
            class="btn btn-success">

            Update Price

        </button>

    </form>

</div>

{% endblock %}
